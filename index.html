<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>183 Pupil Demo</title>

<style>
body{
  font-family:system-ui;
  background:#f2f4f7;
  margin:0;
  padding:30px;
}

button{
  padding:10px 16px;
  border-radius:10px;
  border:none;
  background:#005EB8;
  color:white;
  font-weight:700;
  cursor:pointer;
}

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.popup-content{
  background:white;
  width:900px;
  border-radius:16px;
  padding:20px;
  max-height:90vh;
  overflow:auto;
}

.top{
  display:flex;
  gap:20px;
  align-items:center;
  margin-bottom:20px;
  flex-wrap:wrap;
}

select{
  padding:8px;
  border-radius:8px;
}

.layout{
  display:flex;
  gap:30px;
  margin-bottom:20px;

  /* ✅ 1) 동공/렌즈 카드 좌우 고정 (작은 화면에서도 위아래로 안 떨어지게) */
  flex-wrap:nowrap;
}

.card{
  flex:1;
  border:1px solid #ddd;
  border-radius:12px;
  padding:15px;
  min-width:360px; /* 좌우 유지용 */
}

.eye{
  width:200px;
  height:200px;
  border-radius:50%;
  background:radial-gradient(circle,#dfe8f3,#b6c7da);
  position:relative;
  margin:auto;
}

.pupil{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:black;
  border-radius:50%;
}

.lens{
  width:200px;
  height:200px;
  border-radius:50%;
  border:1px solid #ccc;
  position:relative;
  margin:auto;
  background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.95), rgba(255,255,255,.55) 45%, rgba(250,252,255,.2) 75%);
  overflow:hidden;
}

.ring{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  border:2px solid blue;
}

.mid{border-color:green}
.near{border-color:orange}

/* ✅ 광학부(OZ) 표시 링 */
.oz{
  border-color:rgba(16,42,67,.35);
  border-style:dashed;
}

/* ✅ 렌즈 위에 동공(비교용) 오버레이 */
.pupilLens{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:rgba(0,0,0,.18);
  box-shadow:0 0 0 2px rgba(0,0,0,.18) inset;
}

.video{
  width:100%;
  border-radius:12px;
  margin-top:10px;
}

/* 아주 좁은 화면에서는 좌우 유지가 어려우니, 팝업 안에서 가로 스크롤로 유지 */
@media (max-width: 820px){
  .popup-content{ overflow-x:auto; }
  .layout{ width:max-content; }
}
</style>
</head>

<body>

<button onclick="openDemo()">183 데모 열기</button>

<div class="popup" id="popup">
  <div class="popup-content">

    <div class="top">
      <label>Sphere
        <select id="sphere">
          <option value="2">+2.00</option>
          <option value="1">+1.00</option>
          <option value="0">0.00</option>
          <option value="-1">-1.00</option>
          <option value="-2">-2.00</option>
          <option value="-3">-3.00</option>
        </select>
      </label>

      <label>ADD
        <select id="add">
          <option value="low">LOW</option>
          <option value="mid">MID</option>
          <option value="high">HIGH</option>
        </select>
      </label>

      <label>
        <input type="radio" name="design" value="off" checked> OFF
      </label>

      <label>
        <input type="radio" name="design" value="on"> ON (183)
      </label>

      <button onclick="closeDemo()">닫기</button>
    </div>

    <div class="layout">

      <div class="card">
        <h3>환자 동공</h3>
        <div class="eye">
          <div class="pupil" id="pupil"></div>
        </div>
        <p id="pupilText"></p>
      </div>

      <div class="card">
        <h3>렌즈 구조</h3>

        <div class="lens">
          <!-- ✅ 광학부(OZ) 링 (OFF=6.0mm 고정 / ON=동공과 거의 일치) -->
          <div class="ring oz" id="oz"></div>

          <!-- ✅ 비교용: 렌즈 위 동공 오버레이 -->
          <div class="pupilLens" id="pupilOnLens"></div>

          <!-- ✅ 원/중/근 링: 모두 광학부 안에 들어가도록 축소 -->
          <div class="ring near" id="near"></div>
          <div class="ring mid" id="mid"></div>
          <div class="ring" id="dist"></div>
        </div>

        <p id="lensText">Lens diameter 14.5mm<br>Optic zone 6.0mm</p>
      </div>

    </div>

    <div>
      <h3>Vision Simulation</h3>
      <img class="video" src="https://picsum.photos/1000/600">
    </div>

  </div>
</div>

<script>
function openDemo(){
  document.getElementById("popup").style.display="flex"
  update()
}

function closeDemo(){
  document.getElementById("popup").style.display="none"
}

document.getElementById("sphere").onchange=update
document.getElementById("add").onchange=update

// ✅ ON/OFF 변경 시에도 업데이트
document.querySelectorAll('input[name="design"]').forEach(r=>{
  r.onchange = update
})

function getDesign(){
  const r = document.querySelector('input[name="design"]:checked')
  return r ? r.value : "off"
}

/*
  ✅ 3) 동공 로직 수정
  - ±도수 모두 |도수| 커질수록 동공이 작아짐(미세하게)
  - ADD도 커질수록 동공이 작아짐
*/
function calcPupil(){
  let sphere = parseFloat(document.getElementById("sphere").value)
  let add = document.getElementById("add").value

  // 기본(평탄 근처) 동공
  let pupil = 5.0

  // ADD 영향 (기존 느낌 유지)
  if(add=="mid")  pupil -= 0.5
  if(add=="high") pupil -= 1.0

  // Sphere 영향: |sphere| 커질수록 감소 (± 모두)
  pupil -= Math.abs(sphere) * 0.25

  // 범위 클램프 (극단 방지)
  if(pupil < 2.4) pupil = 2.4
  if(pupil > 5.6) pupil = 5.6

  return pupil
}

function update(){
  const pupil = calcPupil()
  const design = getDesign()

  // ====== 좌측(동공) 표시 ======
  let px = 40 + pupil*10
  let pupilEl = document.getElementById("pupil")
  pupilEl.style.width  = px+"px"
  pupilEl.style.height = px+"px"

  document.getElementById("pupilText").innerText =
    "Estimated pupil " + pupil.toFixed(2) + " mm"

  // ====== 우측(렌즈) 표시 ======
  const lensDiaMM = 14.5
  const lensPx = 200
  const scale = lensPx / lensDiaMM

  // ✅ 4) OFF=OZ 6.0 고정 / ON=동공과 거의 일치(클램프)
  let ozMM = 6.0
  if(design === "on"){
    // 동공과 거의 일치시키되, 너무 작/큰 값 방지
    ozMM = pupil
    if(ozMM < 2.6) ozMM = 2.6
    if(ozMM > 6.0) ozMM = 6.0
  }

  const ozPx = ozMM * scale

  // OZ 링
  const ozEl = document.getElementById("oz")
  ozEl.style.width = ozPx + "px"
  ozEl.style.height = ozPx + "px"

  // 렌즈 위 동공 오버레이(비교용)
  const pupilOnLens = document.getElementById("pupilOnLens")
  pupilOnLens.style.width = (pupil * scale) + "px"
  pupilOnLens.style.height = (pupil * scale) + "px"

  // ✅ 원/중/근 링은 "광학부 안"에 모두 들어가게 (비율로 축소)
  //    + "동공 vs 광학부 비교" 목적이라 전체적으로 좀 작게 잡음
  const dist = ozPx * 0.90
  const mid  = ozPx * 0.62
  const near = ozPx * 0.38

  document.getElementById("near").style.width  = near+"px"
  document.getElementById("near").style.height = near+"px"

  document.getElementById("mid").style.width  = mid+"px"
  document.getElementById("mid").style.height = mid+"px"

  document.getElementById("dist").style.width  = dist+"px"
  document.getElementById("dist").style.height = dist+"px"

  // 렌즈 텍스트 업데이트(OFF/ON에서 OZ 값이 달라지니까)
  document.getElementById("lensText").innerHTML =
    "Lens diameter 14.5mm<br>Optic zone " + ozMM.toFixed(1) + "mm"
}

update()
</script>

</body>
</html>
